openapi: 3.0.3
info:
  title: Laboratory External Institution API
  version: 1.3.0
  description: |
    REST API for external hospitals/institutions.
    Supports request push, request query, sample result query, report PDF download,
    and metadata query for sample types/services/profiles.
servers:
  - url: https://{host}
    variables:
      host:
        default: example.com
security:
  - ApiKeyAuth: []
  - BearerAuth: []
  - BasicAuth: []
tags:
  - name: Requests
  - name: Samples
  - name: Reports
  - name: Metadata
paths:
  /lab/api/v1/{endpoint_code}/requests:
    post:
      tags: [Requests]
      summary: Create test request
      operationId: createExternalRequest
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequestPayload'
            examples:
              serviceLine:
                value:
                  external_uid: HIS-REQ-20260222-9001
                  priority: routine
                  clinical_note: External API demo request
                  patient:
                    name: API Patient A
                    identifier: API-ID-9001
                    passport_no: P12345678
                    gender: female
                    birthdate: '1992-01-01'
                    phone: '13800001111'
                    email: patient@example.com
                    country_code: TH
                    state_code: BKK
                    city: Bangkok
                    emergency_contact_name: Family A
                    emergency_contact_phone: '13800002222'
                    informed_consent_signed: true
                  physician:
                    name: Dr. External
                    partner_ref: PHY-001
                    code: PHY-001
                    license_no: LIC-9999
                    specialty: Infectious Disease
                    department_code: OPD
                    institution_ref: HOSP-001
                  lines:
                    - line_type: service
                      service_code: STD_CT
                      quantity: 1
                      specimen_ref: SP1
                      specimen_barcode: API-CUP-9001
                      specimen_sample_type: swab
                  dynamic_forms:
                    - form_code: STD_PRETEST_QA
                      answers:
                        recent_exposure: 'yes'
                        symptoms: 'no'
                        consent: true
      responses:
        '200':
          description: Created or deduplicated by external_uid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRequestResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  value: { ok: false, error: unauthorized }
        '403':
          description: Feature disabled or invalid endpoint protocol
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                disabled:
                  value: { ok: false, error: request_push_disabled }
        '404':
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value: { ok: false, error: endpoint_not_found }

  /lab/api/v1/{endpoint_code}/requests/{request_no}:
    get:
      tags: [Requests]
      summary: Query request by request number
      operationId: getExternalRequest
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
        - in: path
          name: request_no
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Request detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestQueryResponse'
        '401':
          description: Unauthorized
        '403':
          description: Result query disabled
        '404':
          description: Request not found or endpoint not found

  /lab/api/v1/{endpoint_code}/requests/{request_no}/attachments:
    post:
      tags: [Requests]
      summary: Upload request attachments
      operationId: uploadExternalRequestAttachments
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
        - in: path
          name: request_no
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attachments]
              properties:
                attachments:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/AttachmentInput'
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Attachment uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadAttachmentResponse'
        '400':
          description: Invalid attachment payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Request push disabled
        '404':
          description: Request not found or endpoint not found

  /lab/api/v1/{endpoint_code}/samples/{accession}/results:
    get:
      tags: [Samples]
      summary: Query sample results by accession
      operationId: getExternalSampleResults
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
        - in: path
          name: accession
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Sample result payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleResultResponse'
        '401':
          description: Unauthorized
        '403':
          description: Result query disabled
        '404':
          description: Sample not found or endpoint not found

  /lab/api/v1/{endpoint_code}/samples/{accession}/report/pdf:
    get:
      tags: [Reports]
      summary: Download sample report PDF
      operationId: downloadExternalSampleReportPdf
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
        - in: path
          name: accession
          required: true
          schema: { type: string }
      responses:
        '200':
          description: PDF binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
        '403':
          description: Report download disabled
        '404':
          description: Sample/endpoint not found
        '409':
          description: Report not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notReady:
                  value: { ok: false, error: report_not_ready }

  /lab/api/v1/{endpoint_code}/meta/sample_types:
    get:
      tags: [Metadata]
      summary: Query sample types metadata
      operationId: getExternalSampleTypesMeta
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Active sample type metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleTypesMetaResponse'
              examples:
                ok:
                  value:
                    ok: true
                    sample_types:
                      - code: swab
                        name: Swab
                        is_default: true
        '401':
          description: Unauthorized
        '403':
          description: Metadata query disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                disabled:
                  value: { ok: false, error: metadata_query_disabled }
        '404':
          description: Endpoint not found

  /lab/api/v1/{endpoint_code}/meta/services:
    get:
      tags: [Metadata]
      summary: Query services metadata
      operationId: getExternalServicesMeta
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Active service metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicesMetaResponse'
              examples:
                ok:
                  value:
                    ok: true
                    services:
                      - code: STD_CT
                        name: Chlamydia Trachomatis PCR
                        sample_type: swab
        '401':
          description: Unauthorized
        '403':
          description: Metadata query disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                disabled:
                  value: { ok: false, error: metadata_query_disabled }
        '404':
          description: Endpoint not found

  /lab/api/v1/{endpoint_code}/meta/profiles:
    get:
      tags: [Metadata]
      summary: Query profiles metadata
      operationId: getExternalProfilesMeta
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Active profile metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilesMetaResponse'
              examples:
                ok:
                  value:
                    ok: true
                    profiles:
                      - code: STD7-7
                        name: STD 7 Panel
                        sample_type: swab
        '401':
          description: Unauthorized
        '403':
          description: Metadata query disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                disabled:
                  value: { ok: false, error: metadata_query_disabled }
        '404':
          description: Endpoint not found

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic

  schemas:
    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
          enum:
            - endpoint_not_found
            - endpoint_protocol_not_rest
            - unauthorized
            - request_push_disabled
            - result_query_disabled
            - report_download_disabled
            - metadata_query_disabled
            - lines_required
            - invalid_line_type
            - service_not_found
            - profile_not_found
            - request_not_found
            - sample_not_found
            - report_not_ready
            - required_dynamic_form_missing
            - required_dynamic_field_missing
            - dynamic_form_not_found

    CreateRequestPayload:
      type: object
      required: [lines]
      properties:
        external_uid:
          type: string
          description: Idempotency key unique under one endpoint
        requested_collection_date:
          type: string
          format: date-time
        priority:
          type: string
          enum: [routine, urgent, stat]
          default: routine
        clinical_note:
          type: string
        preferred_template_code:
          type: string
        patient:
          $ref: '#/components/schemas/PatientInput'
        physician:
          $ref: '#/components/schemas/PhysicianInput'
        lines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RequestLineInput'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentInput'
        dynamic_forms:
          type: array
          items:
            $ref: '#/components/schemas/DynamicFormInput'

    PatientInput:
      type: object
      properties:
        id:
          type: integer
          description: Existing lab.patient id (same company)
        name:
          type: string
        patient_id_no:
          type: string
          description: Alias of identifier
        id_no:
          type: string
          description: Alias of identifier
        identifier:
          type: string
          description: Patient ID / national ID
        passport_no:
          type: string
        passport:
          type: string
          description: Alias of passport_no
        gender:
          type: string
          enum: [male, female, other, unknown]
          default: unknown
        birthdate:
          type: string
          format: date
        phone:
          type: string
        email:
          type: string
          format: email
        lang:
          type: string
          description: Odoo language code, e.g. en_US / zh_CN / th_TH
        street:
          type: string
        street2:
          type: string
        city:
          type: string
        state_id:
          type: integer
        state_code:
          type: string
        state:
          type: string
        zip:
          type: string
        country_id:
          type: integer
        country_code:
          type: string
        country:
          type: string
        emergency_contact_name:
          type: string
        emergency_contact_phone:
          type: string
        emergency_contact_relation:
          type: string
        allergy_history:
          type: string
        past_medical_history:
          type: string
        medication_history:
          type: string
        pregnancy_status:
          type: string
          enum: [not_applicable, pregnant, not_pregnant, unknown]
        breastfeeding:
          type: boolean
        insurance_provider:
          type: string
        insurance_no:
          type: string
        informed_consent_signed:
          type: boolean
        informed_consent_date:
          type: string
          format: date
        note:
          type: string

    PhysicianInput:
      type: object
      properties:
        id:
          type: integer
          description: Existing lab.physician id (same company)
        name:
          type: string
        code:
          type: string
        partner_ref:
          type: string
          description: Alias of code
        license_no:
          type: string
        title:
          type: string
        specialty:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        department_id:
          type: integer
        department_code:
          type: string
        institution_id:
          type: integer
        institution_ref:
          type: string
          description: Match partner ref/vat
        institution_name:
          type: string
        notify_by_email:
          type: boolean
        notify_by_sms:
          type: boolean
        note:
          type: string

    RequestLineInput:
      type: object
      required: [line_type]
      properties:
        line_type:
          type: string
          enum: [service, profile]
        service_code:
          type: string
          description: Required when line_type=service
        profile_code:
          type: string
          description: Required when line_type=profile
        quantity:
          type: integer
          minimum: 1
          default: 1
        specimen_ref:
          type: string
          default: SP1
        specimen_barcode:
          type: string
        specimen_sample_type:
          type: string
          default: swab
        note:
          type: string

    AttachmentInput:
      type: object
      required: [name, content_base64]
      properties:
        name:
          type: string
        content_base64:
          type: string
          description: Base64-encoded binary content
        mimetype:
          type: string

    DynamicFormInput:
      type: object
      required: [form_code, answers]
      properties:
        form_code:
          type: string
        answers:
          type: object
          additionalProperties: true
          description: Key-value map; key must match dynamic form field key.

    CreateRequestResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        deduplicated:
          type: boolean
          description: true when external_uid already exists
        request:
          $ref: '#/components/schemas/RequestObject'

    RequestQueryResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        request:
          $ref: '#/components/schemas/RequestObject'

    RequestObject:
      type: object
      properties:
        id:
          type: integer
        request_no:
          type: string
        state:
          type: string
        request_type:
          type: string
        requester:
          type: string
        institution:
          type: string
        priority:
          type: string
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        patient:
          $ref: '#/components/schemas/PatientSummary'
        physician:
          $ref: '#/components/schemas/PhysicianSummary'
        samples:
          type: array
          items:
            $ref: '#/components/schemas/RequestSample'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentSummary'

    RequestSample:
      type: object
      properties:
        sample_id:
          type: integer
        accession:
          type: string
        barcode:
          type: string
        state:
          type: string
        report_date:
          type: string
          format: date-time
          nullable: true

    AttachmentSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        mimetype:
          type: string
        size:
          type: integer

    UploadAttachmentResponse:
      type: object
      required: [ok, request_no, attachments_uploaded]
      properties:
        ok:
          type: boolean
          enum: [true]
        request_no:
          type: string
        attachments_uploaded:
          type: integer
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentSummary'

    SampleResultResponse:
      type: object
      required: [ok, sample]
      properties:
        ok:
          type: boolean
          enum: [true]
        sample:
          $ref: '#/components/schemas/SampleObject'

    SampleTypesMetaResponse:
      type: object
      required: [ok, sample_types]
      properties:
        ok:
          type: boolean
          enum: [true]
        sample_types:
          type: array
          items:
            $ref: '#/components/schemas/SampleTypeMeta'

    ServicesMetaResponse:
      type: object
      required: [ok, services]
      properties:
        ok:
          type: boolean
          enum: [true]
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceMeta'

    ProfilesMetaResponse:
      type: object
      required: [ok, profiles]
      properties:
        ok:
          type: boolean
          enum: [true]
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/ProfileMeta'

    SampleObject:
      type: object
      properties:
        id:
          type: integer
        accession:
          type: string
        barcode:
          type: string
        state:
          type: string
        report_date:
          type: string
          format: date-time
          nullable: true
        patient:
          $ref: '#/components/schemas/SamplePatientSummary'
        request_no:
          type: string
        ai_interpretation:
          type: string
          description: Empty string when AI text is not portal-visible
        results:
          type: array
          items:
            $ref: '#/components/schemas/ResultLine'

    ResultLine:
      type: object
      properties:
        service_code:
          type: string
        service_name:
          type: string
        result_value:
          type: string
        binary_interpretation:
          type: string
        state:
          type: string
        unit:
          type: string
        ref_min:
          type: number
          nullable: true
        ref_max:
          type: number
          nullable: true

    SampleTypeMeta:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        is_default:
          type: boolean

    ServiceMeta:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        sample_type:
          type: string

    ProfileMeta:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        sample_type:
          type: string

    PatientAddress:
      type: object
      properties:
        street:
          type: string
        street2:
          type: string
        city:
          type: string
        state_code:
          type: string
        state:
          type: string
        zip:
          type: string
        country_code:
          type: string
        country:
          type: string

    PatientEmergencyContact:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        relation:
          type: string

    PatientSummary:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
        identifier:
          type: string
        passport_no:
          type: string
        gender:
          type: string
        birthdate:
          type: string
          format: date
          nullable: true
        age_display:
          type: string
        phone:
          type: string
        email:
          type: string
        lang:
          type: string
        address:
          $ref: '#/components/schemas/PatientAddress'
        emergency_contact:
          $ref: '#/components/schemas/PatientEmergencyContact'

    PhysicianDepartmentSummary:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        code:
          type: string
        name:
          type: string

    PhysicianInstitutionSummary:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string

    PhysicianSummary:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
        code:
          type: string
        license_no:
          type: string
        title:
          type: string
        specialty:
          type: string
        phone:
          type: string
        email:
          type: string
        department:
          $ref: '#/components/schemas/PhysicianDepartmentSummary'
        institution:
          $ref: '#/components/schemas/PhysicianInstitutionSummary'
        notify_by_email:
          type: boolean
        notify_by_sms:
          type: boolean

    SamplePatientSummary:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
        identifier:
          type: string
        passport_no:
          type: string
