openapi: 3.0.3
info:
  title: Laboratory External Institution API
  version: 1.5.0
  description: |
    External business API for hospitals, institutions, partner platforms and ordering systems.
    This specification is aligned to the current implementation in controllers/external_api.py.
    It covers request creation, attachment upload, request query, sample result query,
    REST/HL7 result push, PDF report download and metadata endpoints.
servers:
  - url: https://{host}
    variables:
      host:
        default: example.com
security:
  - ApiKeyAuth: []
  - BearerAuth: []
  - BasicAuth: []
tags:
  - name: Requests
  - name: Results
  - name: Samples
  - name: Reports
  - name: Metadata
paths:
  /lab/api/v1/{endpoint_code}/requests:
    post:
      tags: [Requests]
      summary: Create external test request
      description: |
        Odoo route type is `json`. Integrators should send a JSON body containing the business payload.
        If `external_uid` already exists under the same endpoint, the response is deduplicated.
      operationId: createExternalRequest
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequestPayload'
      responses:
        '200':
          description: Request created or deduplicated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRequestResponse'
        '400':
          description: Validation or create failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Request push disabled
        '404':
          description: Endpoint not found

  /lab/api/v1/{endpoint_code}/requests/{request_no}:
    get:
      tags: [Requests]
      summary: Query request by request number
      operationId: getExternalRequest
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
        - in: path
          name: request_no
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Request detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestQueryResponse'
        '401':
          description: Unauthorized
        '403':
          description: Result query disabled
        '404':
          description: Request or endpoint not found

  /lab/api/v1/{endpoint_code}/requests/{request_no}/attachments:
    post:
      tags: [Requests]
      summary: Upload attachments to an existing request
      operationId: uploadRequestAttachments
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
        - in: path
          name: request_no
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attachments]
              properties:
                attachments:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/AttachmentInput'
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Attachments stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadAttachmentResponse'
        '400':
          description: Invalid attachment payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Request push disabled
        '404':
          description: Request or endpoint not found

  /lab/api/v1/{endpoint_code}/results:
    post:
      tags: [Results]
      summary: Push results by accession in payload
      operationId: pushResultsByPayload
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultPushPayload'
      responses:
        '200':
          description: Ingest ACK payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPushResponse'
        '400':
          description: Invalid JSON or ingest failure
        '401':
          description: Unauthorized
        '403':
          description: Result push disabled, protocol not allowed, or direction not allowed
        '404':
          description: Endpoint not found

  /lab/api/v1/{endpoint_code}/samples/{accession}/results:
    post:
      tags: [Results]
      summary: Push results by accession in path
      operationId: pushResultsByPath
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
        - in: path
          name: accession
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultPushPayloadByPath'
      responses:
        '200':
          description: Ingest ACK payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPushResponse'
        '400':
          description: Invalid JSON or ingest failure
        '401':
          description: Unauthorized
        '403':
          description: Result push disabled, protocol not allowed, or direction not allowed
        '404':
          description: Endpoint not found
    get:
      tags: [Samples]
      summary: Query sample results by accession
      operationId: getSampleResults
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
        - in: path
          name: accession
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Sample result payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleResultResponse'
        '401':
          description: Unauthorized
        '403':
          description: Result query disabled
        '404':
          description: Sample or endpoint not found

  /lab/api/v1/{endpoint_code}/hl7/oru:
    post:
      tags: [Results]
      summary: Push raw HL7 ORU message
      description: |
        Endpoint protocol must be `hl7v2`. Response is plain text HL7 ACK.
      operationId: pushHl7Oru
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: HL7 ACK text
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Invalid HL7 payload
        '401':
          description: Unauthorized
        '403':
          description: Result push disabled, protocol mismatch, or direction not allowed
        '404':
          description: Endpoint not found

  /lab/api/v1/{endpoint_code}/samples/{accession}/report/pdf:
    get:
      tags: [Reports]
      summary: Download report PDF
      operationId: downloadReportPdf
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
        - in: path
          name: accession
          required: true
          schema: { type: string }
      responses:
        '200':
          description: PDF stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
        '403':
          description: Report download disabled
        '404':
          description: Sample or endpoint not found
        '409':
          description: Report not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /lab/api/v1/{endpoint_code}/meta/sample_types:
    get:
      tags: [Metadata]
      summary: Query specimen type metadata
      operationId: getSampleTypesMeta
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Active specimen types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SampleTypesMetaResponse'
        '401':
          description: Unauthorized
        '403':
          description: Metadata query disabled
        '404':
          description: Endpoint not found

  /lab/api/v1/{endpoint_code}/meta/services:
    get:
      tags: [Metadata]
      summary: Query service metadata
      operationId: getServicesMeta
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Active services
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicesMetaResponse'
        '401':
          description: Unauthorized
        '403':
          description: Metadata query disabled
        '404':
          description: Endpoint not found

  /lab/api/v1/{endpoint_code}/meta/profiles:
    get:
      tags: [Metadata]
      summary: Query panel metadata
      operationId: getProfilesMeta
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Active panels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilesMetaResponse'
        '401':
          description: Unauthorized
        '403':
          description: Metadata query disabled
        '404':
          description: Endpoint not found
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
          description: Current implementation error code
        detail:
          type: string
        line_index:
          type: integer
        attachment_index:
          type: integer
        max_bytes:
          type: integer
        allowed_protocols:
          type: array
          items: { type: string }
        service_code:
          type: string
        profile_code:
          type: string
        specimen_sample_type:
          type: string

    CreateRequestPayload:
      type: object
      required: [lines]
      properties:
        external_uid:
          type: string
        requested_collection_date:
          type: string
          format: date-time
        priority:
          type: string
          enum: [routine, urgent, stat]
          default: routine
        clinical_note:
          type: string
        preferred_template_code:
          type: string
        patient:
          $ref: '#/components/schemas/PatientInput'
        physician:
          $ref: '#/components/schemas/PhysicianInput'
        lines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RequestLineInput'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentInput'
        dynamic_forms:
          type: object
          additionalProperties: true
          description: Current implementation validates a keyed form payload object.

    PatientInput:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        identifier: { type: string }
        patient_id_no: { type: string }
        id_no: { type: string }
        passport_no: { type: string }
        passport: { type: string }
        gender:
          type: string
          enum: [male, female, other, unknown]
        birthdate:
          type: string
          format: date
        phone: { type: string }
        email:
          type: string
          format: email
        lang: { type: string }
        street: { type: string }
        street2: { type: string }
        city: { type: string }
        state_id: { type: integer }
        state_code: { type: string }
        state: { type: string }
        zip: { type: string }
        country_id: { type: integer }
        country_code: { type: string }
        country: { type: string }
        emergency_contact_name: { type: string }
        emergency_contact_phone: { type: string }
        emergency_contact_relation: { type: string }
        allergy_history: { type: string }
        past_medical_history: { type: string }
        medication_history: { type: string }
        pregnancy_status:
          type: string
          enum: [not_applicable, pregnant, not_pregnant, unknown]
        breastfeeding: { type: boolean }
        insurance_provider: { type: string }
        insurance_no: { type: string }
        informed_consent_signed: { type: boolean }
        informed_consent_date:
          type: string
          format: date
        note: { type: string }

    PhysicianInput:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
        partner_ref: { type: string }
        license_no: { type: string }
        title: { type: string }
        specialty: { type: string }
        phone: { type: string }
        email:
          type: string
          format: email
        department_id: { type: integer }
        department_code: { type: string }
        institution_id: { type: integer }
        institution_ref: { type: string }
        institution_name: { type: string }
        notify_by_email: { type: boolean }
        notify_by_sms: { type: boolean }
        note: { type: string }

    RequestLineInput:
      type: object
      required: [line_type, specimen_sample_type]
      properties:
        line_type:
          type: string
          enum: [service, profile]
        service_code:
          type: string
        profile_code:
          type: string
        quantity:
          type: integer
          minimum: 1
          default: 1
        specimen_ref:
          type: string
          default: SP1
        specimen_barcode:
          type: string
        specimen_sample_type:
          type: string
        note:
          type: string

    AttachmentInput:
      type: object
      required: [name, content_base64]
      properties:
        name: { type: string }
        filename: { type: string }
        content_base64:
          type: string
          description: Base64 binary data
        datas:
          type: string
          description: Alias of content_base64
        mimetype: { type: string }

    ResultLineInput:
      type: object
      required: [service_code, result]
      properties:
        service_code: { type: string }
        result: { type: string }
        note: { type: string }

    ResultPushPayload:
      type: object
      required: [accession, results]
      properties:
        external_uid: { type: string }
        accession: { type: string }
        results:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ResultLineInput'
        meta:
          type: object
          additionalProperties: true

    ResultPushPayloadByPath:
      type: object
      required: [results]
      properties:
        external_uid: { type: string }
        results:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ResultLineInput'
        meta:
          type: object
          additionalProperties: true

    ResultPushResponse:
      type: object
      properties:
        ok: { type: boolean }
        ack_code:
          type: string
          enum: [AA, AE, AR]
        job_id: { type: integer }
        job_name: { type: string }
        state: { type: string }
        error: { type: string }

    CreateRequestResponse:
      type: object
      properties:
        ok: { type: boolean }
        deduplicated: { type: boolean }
        request:
          $ref: '#/components/schemas/RequestObject'

    RequestQueryResponse:
      type: object
      properties:
        ok: { type: boolean }
        request:
          $ref: '#/components/schemas/RequestObject'

    RequestObject:
      type: object
      properties:
        id: { type: integer }
        request_no: { type: string }
        state: { type: string }
        request_type: { type: string }
        requester: { type: string }
        institution: { type: string }
        priority: { type: string }
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        patient:
          $ref: '#/components/schemas/PatientSummary'
        physician:
          $ref: '#/components/schemas/PhysicianSummary'
        samples:
          type: array
          items:
            $ref: '#/components/schemas/RequestSample'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentSummary'

    RequestSample:
      type: object
      properties:
        sample_id: { type: integer }
        accession: { type: string }
        barcode: { type: string }
        state: { type: string }
        report_date:
          type: string
          format: date-time
          nullable: true

    AttachmentSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        mimetype: { type: string }
        size: { type: integer }

    UploadAttachmentResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        request_no: { type: string }
        attachments_uploaded: { type: integer }
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentSummary'

    SampleResultResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        sample:
          $ref: '#/components/schemas/SampleObject'

    SampleObject:
      type: object
      properties:
        id: { type: integer }
        accession: { type: string }
        barcode: { type: string }
        state: { type: string }
        report_date:
          type: string
          format: date-time
          nullable: true
        patient:
          $ref: '#/components/schemas/SamplePatientSummary'
        request_no: { type: string }
        ai_interpretation:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/ResultLine'

    ResultLine:
      type: object
      properties:
        service_code: { type: string }
        service_name: { type: string }
        result_value: { type: string }
        binary_interpretation: { type: string }
        state: { type: string }
        unit: { type: string }
        ref_min:
          type: number
          nullable: true
        ref_max:
          type: number
          nullable: true

    SampleTypesMetaResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        sample_types:
          type: array
          items:
            $ref: '#/components/schemas/SampleTypeMeta'

    ServicesMetaResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceMeta'

    ProfilesMetaResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/ProfileMeta'

    SampleTypeMeta:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        is_default: { type: boolean }

    ServiceMeta:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        sample_type: { type: string }

    ProfileMeta:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        sample_type: { type: string }

    PatientAddress:
      type: object
      properties:
        street: { type: string }
        street2: { type: string }
        city: { type: string }
        state_code: { type: string }
        state: { type: string }
        zip: { type: string }
        country_code: { type: string }
        country: { type: string }

    PatientEmergencyContact:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        relation: { type: string }

    PatientSummary:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name: { type: string }
        identifier: { type: string }
        passport_no: { type: string }
        gender: { type: string }
        birthdate:
          type: string
          format: date
          nullable: true
        age_display: { type: string }
        phone: { type: string }
        email: { type: string }
        lang: { type: string }
        address:
          $ref: '#/components/schemas/PatientAddress'
        emergency_contact:
          $ref: '#/components/schemas/PatientEmergencyContact'

    PhysicianDepartmentSummary:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        code: { type: string }
        name: { type: string }

    PhysicianInstitutionSummary:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name: { type: string }

    PhysicianSummary:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name: { type: string }
        code: { type: string }
        license_no: { type: string }
        title: { type: string }
        specialty: { type: string }
        phone: { type: string }
        email: { type: string }
        department:
          $ref: '#/components/schemas/PhysicianDepartmentSummary'
        institution:
          $ref: '#/components/schemas/PhysicianInstitutionSummary'
        notify_by_email: { type: boolean }
        notify_by_sms: { type: boolean }

    SamplePatientSummary:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name: { type: string }
        identifier: { type: string }
        passport_no: { type: string }
