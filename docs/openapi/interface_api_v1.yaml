openapi: 3.0.3
info:
  title: Laboratory Interface Channel API
  version: 1.1.0
  description: |
    Lower-level LIS/HIS/instrument interface channel API.
    This specification is aligned to controllers/interface_api.py.
    It documents inbound JSON-RPC, inbound raw protocol messages and outbound ACK callback.
servers:
  - url: https://{host}
    variables:
      host:
        default: example.com
security:
  - ApiKeyAuth: []
  - BearerAuth: []
  - BasicAuth: []
tags:
  - name: Interface Inbound
  - name: Interface Outbound
paths:
  /lab/interface/inbound/{endpoint_code}:
    post:
      tags: [Interface Inbound]
      summary: Inbound JSON-RPC message
      description: |
        Odoo route type is `jsonrpc`. The body shown here is the effective business payload.
      operationId: interfaceInboundJsonrpc
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboundMessage'
      responses:
        '200':
          description: ACK payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundAck'

  /lab/interface/inbound/{endpoint_code}/raw:
    post:
      tags: [Interface Inbound]
      summary: Inbound raw HL7/FHIR/REST message
      operationId: interfaceInboundRaw
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Protocol-specific ACK
          content:
            text/plain:
              schema:
                type: string
            application/fhir+json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Parse or processing failure
        '401':
          description: Unauthorized
        '403':
          description: Direction not allowed
        '404':
          description: Endpoint not found

  /lab/interface/outbound/{endpoint_code}/ack:
    post:
      tags: [Interface Outbound]
      summary: Receive outbound ACK callback
      description: |
        Odoo route type is `jsonrpc`. The body shown here is the effective business payload.
      operationId: interfaceOutboundAck
      parameters:
        - in: path
          name: endpoint_code
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutboundAckInput'
      responses:
        '200':
          description: ACK accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    InboundMessage:
      type: object
      properties:
        message_type:
          type: string
          default: order
        payload:
          type: object
          additionalProperties: true
        external_uid:
          type: string
        raw_message:
          type: string

    InboundAck:
      type: object
      properties:
        ok:
          type: boolean
        ack_code:
          type: string
          description: AA = accepted, AE = error, AR = rejected
        job_id:
          type: integer
        job_name:
          type: string
        state:
          type: string
        error:
          type: string

    OutboundAckInput:
      type: object
      properties:
        ack_code:
          type: string
        job_name:
          type: string
        job_id:
          type: integer
        external_uid:
          type: string
        message:
          type: string
        payload:
          type: object
          additionalProperties: true

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
